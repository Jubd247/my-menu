<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Supreme IT - Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0d0d0d; color: #eee; font-family: sans-serif; }
        .card { background: #161616; border: 1px solid #222; }
        @media print { body * { visibility: hidden; } #p-area, #p-area * { visibility: visible; } #p-area { position: absolute; left: 0; top: 0; width: 100%; color: #000 !important; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login" class="fixed inset-0 bg-black z-[200] flex items-center justify-center p-6">
        <div class="bg-[#161616] p-8 rounded-3xl border border-[#c9a84c] w-full max-w-sm text-center shadow-2xl">
            <h2 class="text-2xl font-bold text-[#c9a84c] mb-6 tracking-widest">ADMIN LOGIN</h2>
            <input type="password" id="passInp" placeholder="Password" class="w-full p-4 bg-black border border-gray-800 rounded-xl mb-4 text-center text-white outline-none">
            <button onclick="checkPass()" class="w-full bg-[#c9a84c] text-black font-bold py-4 rounded-xl active:scale-95 transition">লগইন</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold text-[#c9a84c] mb-8 border-b border-gray-900 pb-4">SUPREME IT - CONTROL PANEL</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="card p-6 rounded-2xl text-center">
                <p class="text-xs text-gray-500 uppercase">Today's Sales</p>
                <p class="text-4xl font-bold text-[#c9a84c] mt-2">৳ <span id="sales-val">0</span></p>
            </div>
            <div class="card p-6 rounded-2xl text-center">
                <p class="text-xs text-gray-500 uppercase">Orders</p>
                <p class="text-4xl font-bold mt-2" id="order-val">0</p>
            </div>
            <div class="card p-4 rounded-2xl"><canvas id="salesChart" height="100"></canvas></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="card p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4">Live Orders</h2>
                <div id="order-list" class="space-y-4 max-h-[500px] overflow-y-auto pr-2"></div>
            </div>

            <div class="card p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-4">Menu & Stock</h2>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <input id="nInp" placeholder="খাবারের নাম" class="bg-[#222] p-3 rounded-xl border border-gray-800 text-sm">
                    <input id="pInp" type="number" placeholder="দাম" class="bg-[#222] p-3 rounded-xl border border-gray-800 text-sm">
                    <input id="iInp" placeholder="ইমেজ লিঙ্ক" class="bg-[#222] p-3 rounded-xl border border-gray-800 text-sm col-span-2">
                    <button onclick="addItem()" class="bg-[#c9a84c] text-black font-bold p-3 rounded-xl col-span-2">নতুন খাবার যোগ করুন</button>
                </div>
                <div id="menu-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <div id="p-area" class="hidden font-mono p-4 w-[300px]"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, updateDoc, doc, addDoc, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAIBAoApGa4HXrdk15tezQl9WYeIIGEci4", authDomain: "qr-menu-system-88ea9.firebaseapp.com", projectId: "qr-menu-system-88ea9", appId: "1:1038515456469:web:bfd7366988b7119ea9155c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.checkPass = () => { if(document.getElementById('passInp').value === '1234') document.getElementById('login').style.display='none'; };

        // গ্রাফ লজিক
        const ctx = document.getElementById('salesChart').getContext('2d');
        let myChart = new Chart(ctx, { type: 'line', data: { labels: ['S','S','M','T','W','T','F'], datasets: [{ label: 'Sales', data: [0,0,0,0,0,0,0], borderColor: '#c9a84c', tension: 0.4, fill: true, backgroundColor: 'rgba(201,168,76,0.1)' }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } } });

        // লাইভ ডাটা
        onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snap) => {
            let sales = 0; const list = document.getElementById('order-list'); list.innerHTML = '';
            snap.forEach(d => {
                const o = d.data(); if(o.status === 'Done') sales += Number(o.total_amount);
                list.innerHTML += `<div class="bg-[#222] p-4 rounded-xl border-l-4 ${o.status==='Pending'?'border-yellow-500':'border-green-500'}">
                    <div class="flex justify-between text-xs mb-2 text-gray-400 font-bold"><span>টেবিল ${o.table_number}</span> <span>${o.customer_name}</span></div>
                    <p class="text-sm font-bold gold-text">${o.items}</p>
                    <div class="flex gap-2 mt-4 items-center">
                        <select onchange="updateStat('${d.id}', this.value)" class="bg-black text-[10px] p-2 rounded border border-gray-800">
                            <option value="Pending" ${o.status==='Pending'?'selected':''}>Pending</option>
                            <option value="Cooking" ${o.status==='Cooking'?'selected':''}>Cooking</option>
                            <option value="Served" ${o.status==='Served'?'selected':''}>Served</option>
                            <option value="Done" ${o.status==='Done'?'selected':''}>Done</option>
                            <option value="Cancelled" ${o.status==='Cancelled'?'selected':''}>Cancel</option>
                        </select>
                        <button onclick="printBill('${d.id}')" class="bg-blue-600 text-white px-4 py-1 rounded-lg text-[10px]">Print Bill</button>
                        <span class="ml-auto font-bold">৳${o.total_amount}</span>
                    </div>
                </div>`;
            });
            document.getElementById('sales-val').innerText = isNaN(sales) ? 0 : sales;
            document.getElementById('order-val').innerText = snap.size;
        });

        window.updateStat = (id, s) => updateDoc(doc(db, "orders", id), { status: s });

        // মেনু ও স্টক
        onSnapshot(collection(db, "restaurants/demo-restaurant/menu"), (snap) => {
            const mList = document.getElementById('menu-list'); mList.innerHTML = '';
            snap.forEach(d => {
                const i = d.data();
                mList.innerHTML += `<div class="flex items-center justify-between bg-[#222] p-3 rounded-xl border border-gray-800">
                    <div class="flex items-center gap-3 text-xs">
                        <img src="${i.image}" class="w-10 h-10 rounded-lg object-cover">
                        <div><p class="font-bold">${i.name}</p><p class="text-[#c9a84c]">৳${i.price_full}</p></div>
                    </div>
                    <button onclick="toggleStock('${d.id}', ${!i.is_available})" class="text-[10px] font-bold ${i.is_available?'text-green-500':'text-red-500'}">
                        ${i.is_available?'In Stock':'Out of Stock'}
                    </button>
                </div>`;
            });
        });

        window.toggleStock = (id, s) => updateDoc(doc(db, "restaurants/demo-restaurant/menu", id), { is_available: s });

        window.addItem = () => {
            const n = document.getElementById('nInp').value;
            const p = Number(document.getElementById('pInp').value);
            if(!n || !p) return alert("তথ্য দিন!");
            addDoc(collection(db, "restaurants/demo-restaurant/menu"), {
                name: n, price_full: p, price_half: p*0.6, image: document.getElementById('iInp').value, category: "All", is_available: true, createdAt: serverTimestamp()
            });
        };

        window.printBill = (id) => {
            // সিম্পল প্রিন্ট লজিক
            const orderCard = event.target.closest('div.bg-[#222]').innerHTML;
            const pArea = document.getElementById('p-area');
            pArea.innerHTML = `<center><h2>SUPREME IT HOTEL</h2><p>Panchobati, Narayanganj</p><hr>${orderCard}</center>`;
            window.print();
        };
    </script>
</body>
</html>
