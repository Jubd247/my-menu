<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme IT - Pro Admin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root { --gold: #c9a84c; --bg: #0d0d0d; --card: #161616; --text: #f5f0e8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); text-align: center; }
        .stat-card h2 { margin: 0; color: var(--gold); font-size: 28px; }
        
        .box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; }
        .tab-btn { padding: 12px 25px; border: 1px solid var(--gold); background: transparent; color: #fff; cursor: pointer; border-radius: 8px; white-space: nowrap; }
        .active-tab { background: var(--gold); color: #000; font-weight: bold; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }
        
        .order-card { border-left: 5px solid var(--gold); padding: 15px; background: #1a1a1a; margin-bottom: 15px; border-radius: 8px; }
        .print-btn { background: #fff; color: #000; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; border: none; margin-top: 10px; }
        
        @media print { body * { visibility: hidden; } .print-section, .print-section * { visibility: visible; } .print-section { position: absolute; left: 0; top: 0; width: 100%; color: black !important; background: white !important; } }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="stat-card"><h3>মোট অর্ডার</h3><h2 id="totalOrders">০</h2></div>
        <div class="stat-card"><h3>আজকের বিক্রি</h3><h2 id="todaySales">৳০</h2></div>
        <div class="stat-card"><h3>পেন্ডিং অর্ডার</h3><h2 id="pendingOrders">০</h2></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active-tab" onclick="showTab('menu-tab')">মেনু এডিট/যোগ</button>
        <button class="tab-btn" onclick="showTab('orders-tab')">অর্ডার ও বিল প্রিন্ট</button>
    </div>

    <div id="menu-tab" class="tab-page">
        <div class="box">
            <h3 id="formTitle">আইটেম যোগ/এডিট করুন</h3>
            <input type="hidden" id="editId">
            <input type="text" id="iName" placeholder="খাবারের নাম">
            <input type="number" id="iPrice" placeholder="মূল্য (৳)">
            <input type="text" id="iImg" placeholder="ইমেজ সরাসরি লিঙ্ক (ImgBB)">
            <button class="btn-gold" id="saveItemBtn">আইটেম সেভ করুন</button>
        </div>
        
        <div class="box">
            <h3>বর্তমান মেনু লিস্ট</h3>
            <div id="menuList"></div>
        </div>
    </div>

    <div id="orders-tab" class="tab-page" style="display:none;">
        <div id="orderList"></div>
    </div>

    <div id="printArea" class="print-section" style="display:none; padding: 20px; font-family: monospace;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAIBAoApGa4HXrdk15tezQl9WYeIIGEci4",
        authDomain: "qr-menu-system-88ea9.firebaseapp.com",
        projectId: "qr-menu-system-88ea9",
        appId: "1:1038515456469:web:bfd7366988b7119ea9155c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.showTab = (id) => {
        document.querySelectorAll('.tab-page').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        event.target.classList.add('active-tab');
    };

    // মেনু লোড ও এডিট লজিক
    onSnapshot(query(collection(db, "restaurants/demo-restaurant/menu"), orderBy("createdAt", "desc")), (snap) => {
        const list = document.getElementById('menuList');
        list.innerHTML = '';
        snap.forEach(d => {
            const i = d.data();
            list.innerHTML += `
                <div style="display:flex; align-items:center; border-bottom:1px solid #333; padding:10px;">
                    <img src="${i.image || 'https://via.placeholder.com/50'}" style="width:50px; height:50px; border-radius:5px; margin-right:10px;">
                    <div style="flex:1;"><b>${i.name}</b><br>৳${i.price}</div>
                    <button onclick="fillEditForm('${d.id}', '${i.name}', ${i.price}, '${i.image}')" style="background:var(--gold); border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Edit</button>
                    <button onclick="deleteItem('${d.id}')" style="background:red; color:white; border:none; padding:5px 10px; border-radius:4px; margin-left:5px; cursor:pointer;">Del</button>
                </div>`;
        });
    });

    window.fillEditForm = (id, name, price, img) => {
        document.getElementById('editId').value = id;
        document.getElementById('iName').value = name;
        document.getElementById('iPrice').value = price;
        document.getElementById('iImg').value = img;
        document.getElementById('formTitle').innerText = "আইটেম আপডেট করুন";
        window.scrollTo(0,0);
    };

    // অর্ডার ও অ্যানালিটিক্স লোড
    onSnapshot(collection(db, "orders"), (snap) => {
        let total = 0, sales = 0, pending = 0;
        const oList = document.getElementById('orderList');
        oList.innerHTML = '<h3>সাম্প্রতিক অর্ডারসমূহ</h3>';
        
        snap.forEach(d => {
            const o = d.data();
            total++;
            if(o.order_status !== 'Done') pending++;
            sales += (o.total_amount || 0);

            oList.innerHTML += `
                <div class="order-card">
                    <b>টেবিল: ${o.table_number}</b> | ${o.customer_name || 'Guest'}<br>
                    খাবার: ${o.items} | বিল: ৳${o.total_amount}<br>
                    <button class="print-btn" onclick="printBill('${o.customer_name}', '${o.table_number}', '${o.items}', ${o.total_amount})">🖨️ বিল প্রিন্ট করুন</button>
                    <select onchange="updateStatus('${d.id}', this.value)" style="width:auto; margin-left:10px;">
                        <option value="">স্ট্যাটাস</option>
                        <option value="Processing">Processing</option>
                        <option value="Done">Done</option>
                    </select>
                </div>`;
        });
        document.getElementById('totalOrders').innerText = total;
        document.getElementById('todaySales').innerText = '৳' + sales;
        document.getElementById('pendingOrders').innerText = pending;
    });

    // বিল প্রিন্ট ফাংশন
    window.printBill = (name, table, items, total) => {
        const p = document.getElementById('printArea');
        p.innerHTML = `
            <center><h2>SUPREME IT HOTEL</h2>
            <p>নারায়ণগঞ্জ, ঢাকা</p></center>
            <hr>
            কাস্টমার: ${name || 'Guest'}<br>
            টেবিল নং: ${table}<br>
            তারিখ: ${new Date().toLocaleString()}<br>
            <hr>
            আইটেম: ${items}<br>
            <hr>
            <b>মোট বিল: ৳${total}</b>
            <br><br><center>ধন্যবাদ, আবার আসবেন!</center>
        `;
        window.print();
    };

    window.updateStatus = async (id, s) => { if(s) await updateDoc(doc(db, "orders", id), { order_status: s }); };
    window.deleteItem = async (id) => { if(confirm("মুছে ফেলবেন?")) await deleteDoc(doc(db, "restaurants/demo-restaurant/menu", id)); };
</script>
</body>
</html>
