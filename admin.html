<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme IT - Master Admin</title>
    <style>
        :root { --gold: #c9a84c; --bg: #0d0d0d; --card: #161616; --text: #f5f0e8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .admin-banner { background: #1a1a1a; height: 80px; border-radius: 12px; border: 1px solid var(--gold); display: flex; justify-content: center; align-items: center; margin-bottom: 20px; text-align: center; }
        .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 10px; border-bottom: 3px solid var(--gold); text-align: center; }
        .box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; max-width: 1200px; margin: 0 auto 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .order-card { border-left: 5px solid var(--gold); padding: 15px; background: #1a1a1a; margin-bottom: 12px; border-radius: 8px; position: relative; }
        .menu-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; border: 1px solid var(--gold); }
        .btn-gold { background: var(--gold); padding: 12px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        @media print { body * { visibility: hidden; } #printArea, #printArea * { visibility: visible; } #printArea { position: absolute; left: 0; top: 0; width: 100%; display: block !important; color: black !important; } }
    </style>
</head>
<body>

<div class="admin-banner"><h2>SUPREME IT CONTROL PANEL</h2></div>

<div class="analytics-grid">
    <div class="stat-card"><h3>মোট অর্ডার</h3><p id="total-ord">০</p></div>
    <div class="stat-card"><h3>মোট বিক্রি</h3><p id="total-sales">৳০</p></div>
</div>

<div class="box">
    <div id="order-list"><h3>অর্ডার লোড হচ্ছে...</h3></div>
</div>

<div class="box">
    <h3>মেনু এডিট/যোগ</h3>
    <input type="text" id="nameInp" placeholder="খাবারের নাম">
    <input type="number" id="priceInp" placeholder="মূল্য">
    <input type="text" id="imgInp" placeholder="ইমেজ লিঙ্ক">
    <button class="btn-gold" onclick="saveItem()">সেভ করুন</button>
    <div id="menu-list" style="margin-top:20px;"></div>
</div>

<div id="printArea" style="display:none; padding: 20px; background: white; color: black;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAIBAoApGa4HXrdk15tezQl9WYeIIGEci4", authDomain: "qr-menu-system-88ea9.firebaseapp.com", projectId: "qr-menu-system-88ea9", appId: "1:1038515456469:web:bfd7366988b7119ea9155c" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snap) => {
        const oCont = document.getElementById('order-list'); oCont.innerHTML = '<h3>সাম্প্রতিক অর্ডার</h3>';
        let sales = 0;
        snap.forEach(d => {
            const o = d.data(); sales += Number(o.total_amount) || 0;
            oCont.innerHTML += `<div class="order-card">
                <b>টেবিল: ${o.table_number}</b> | ${o.customer_name} (${o.customer_phone || 'N/A'})<br>
                খাবার: ${o.items} | বিল: ৳${o.total_amount}<br>
                <button onclick="runPrint('${o.customer_name}', '${o.table_number}', '${o.items}', ${o.total_amount})" style="margin-top:10px; cursor:pointer;">🖨️ প্রিন্ট</button>
                <button onclick="deleteDoc(doc(db, 'orders', '${d.id}'))" style="position:absolute; top:10px; right:10px; color:red; border:none; background:none; cursor:pointer;">✖</button>
            </div>`;
        });
        document.getElementById('total-ord').innerText = snap.size;
        document.getElementById('total-sales').innerText = '৳' + sales;
    });

    onSnapshot(query(collection(db, "restaurants/demo-restaurant/menu"), orderBy("createdAt", "desc")), (snap) => {
        const list = document.getElementById('menu-list'); list.innerHTML = '<h4>মেনু তালিকা</h4>';
        snap.forEach(d => {
            const i = d.data();
            list.innerHTML += `<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
                <div style="display:flex; align-items:center; gap:10px;"><img src="${i.image || 'https://via.placeholder.com/50'}" class="menu-thumb"><span>${i.name} - ৳${i.price}</span></div>
                <button onclick="deleteDoc(doc(db, 'restaurants/demo-restaurant/menu', '${d.id}'))" style="color:red; cursor:pointer;">Del</button>
            </div>`;
        });
    });

    window.saveItem = async () => {
        const n = document.getElementById('nameInp').value; const p = document.getElementById('priceInp').value; const img = document.getElementById('imgInp').value;
        if(n && p) { await addDoc(collection(db, "restaurants/demo-restaurant/menu"), { name: n, price: parseFloat(p), image: img, createdAt: serverTimestamp() }); alert("সেভ হয়েছে!"); }
    };

    window.runPrint = (n, t, i, total) => {
        const area = document.getElementById('printArea');
        area.innerHTML = `<center><h2>SUPREME IT HOTEL</h2><hr>কাস্টমার: ${n}<br>টেবিল: ${t}<hr>${i}<br><h3>মোট বিল: ৳${total}</h3><hr>ধন্যবাদ!</center>`;
        area.style.display = 'block'; window.print(); area.style.display = 'none';
    };
</script>
</body>
</html>
