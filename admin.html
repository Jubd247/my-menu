<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme IT - Professional Admin</title>
    <style>
        :root { --gold: #c9a84c; --bg: #0d0d0d; --card: #161616; --text: #f5f0e8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        .admin-banner { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=800&q=80'); 
            height: 100px; background-size: cover; background-position: center; border-radius: 12px; border: 1px solid var(--gold); 
            display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .admin-banner h1 { color: var(--gold); margin: 0; font-size: 20px; text-transform: uppercase; }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; }
        .tab-btn { padding: 10px 15px; border: 1px solid var(--gold); background: transparent; color: #fff; cursor: pointer; border-radius: 6px; white-space: nowrap; font-size: 14px; }
        .active-tab { background: var(--gold); color: #000; font-weight: bold; }
        
        .box { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }
        
        .order-card { border-left: 5px solid var(--gold); padding: 15px; background: #1a1a1a; margin-bottom: 12px; border-radius: 8px; position: relative; }
        .print-btn { background: #fff; color: #000; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; border: none; margin-top: 10px; }
        .pay-badge { background: #2ecc71; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 5px; }

        /* প্রিন্ট ফরম্যাট */
        @media print { 
            body * { visibility: hidden; } 
            #printArea, #printArea * { visibility: visible; } 
            #printArea { position: absolute; left: 0; top: 0; width: 100%; color: black !important; background: white !important; }
        }
    </style>
</head>
<body>

    <div class="admin-banner">
        <h1>SUPREME IT CONTROL PANEL</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active-tab" onclick="showTab('menu-tab')">খাবার যোগ/এডিট</button>
        <button class="tab-btn" onclick="showTab('order-tab')">অর্ডার ও বিল প্রিন্ট</button>
        <button class="tab-btn" onclick="showTab('settings-tab')">সেটিংস</button>
    </div>

    <div id="menu-tab" class="tab-content">
        <div class="box">
            <h3 id="form-title">আইটেম ম্যানেজমেন্ট</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="nameInp" placeholder="খাবারের নাম">
            <input type="number" id="priceInp" placeholder="মূল্য (৳)">
            <input type="text" id="imgInp" placeholder="ইমেজ লিঙ্ক">
            <button class="btn-gold" id="save-item">সেভ করুন</button>
        </div>
        <div id="menu-list" class="box">লোড হচ্ছে...</div>
    </div>

    <div id="order-tab" class="tab-content" style="display:none;">
        <div id="order-list"></div>
    </div>

    <div id="settings-tab" class="tab-content" style="display:none;">
        <div class="box">
            <h3>হোটেল ইনফো</h3>
            <input type="text" id="setHotelName" value="Supreme IT Hotel">
            <input type="text" id="setHotelAddr" value="নারায়ণগঞ্জ, ঢাকা">
            <button class="btn-gold" id="save-settings">সেটিংস সেভ</button>
        </div>
    </div>

    <div id="printArea" style="display:none;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, deleteDoc, doc, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAIBAoApGa4HXrdk15tezQl9WYeIIGEci4",
        authDomain: "qr-menu-system-88ea9.firebaseapp.com",
        projectId: "qr-menu-system-88ea9",
        appId: "1:1038515456469:web:bfd7366988b7119ea9155c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.showTab = (id) => {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        event.target.classList.add('active-tab');
    };

    // অর্ডার লিস্ট ও পেমেন্ট এডিট
    onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snap) => {
        const oCont = document.getElementById('order-list'); oCont.innerHTML = '';
        snap.forEach(d => {
            const o = d.data();
            oCont.innerHTML += `
                <div class="order-card">
                    <b>টেবিল: ${o.table_number}</b> | ${o.customer_name} 
                    <span class="pay-badge">${o.payment_method || 'Unpaid'}</span><br>
                    খাবার: ${o.items} | বিল: ৳${o.total_amount}<br>
                    
                    <select onchange="updatePayMethod('${d.id}', this.value)" style="width:auto; height:30px; padding:2px; font-size:12px; margin-top:5px;">
                        <option value="">পেমেন্ট ঠিক করুন</option>
                        <option value="Cash">Cash</option>
                        <option value="Bkash">Bkash</option>
                        <option value="Nagad">Nagad</option>
                    </select>

                    <button class="print-btn" onclick="runPrint('${o.customer_name}', '${o.table_number}', '${o.items}', ${o.total_amount}, '${o.payment_method || 'Cash'}')">🖨️ প্রিন্ট বিল</button>
                    <button onclick="deleteDoc(doc(db, 'orders', '${d.id}'))" style="float:right; color:red; border:none; background:none; cursor:pointer; margin-top:15px;">Delete</button>
                </div>`;
        });
    });

    window.updatePayMethod = async (id, val) => { if(val) await updateDoc(doc(db, "orders", id), { payment_method: val }); };

    // প্রিন্ট ডিটেলস ফাংশন
    window.runPrint = (name, table, items, total, pay) => {
        const area = document.getElementById('printArea');
        const hotel = document.getElementById('setHotelName').value;
        const addr = document.getElementById('setHotelAddr').value;
        area.innerHTML = `
            <div style="text-align:center; font-family: sans-serif;">
                <h2 style="margin:0;">${hotel}</h2>
                <p style="font-size:12px;">${addr}</p>
                <hr>
                <div style="text-align:left; font-size:14px;">
                    <p><b>কাস্টমার:</b> ${name}</p>
                    <p><b>টেবিল:</b> ${table}</p>
                    <p><b>পেমেন্ট:</b> ${pay}</p>
                    <p><b>তারিখ:</b> ${new Date().toLocaleString()}</p>
                    <hr>
                    <p><b>আইটেম:</b><br>${items}</p>
                    <hr>
                    <h3 style="text-align:right;">মোট বিল: ৳${total}</h3>
                </div>
                <p>ধন্যবাদ, আবার আসবেন!</p>
            </div>
        `;
        window.print();
    };

    // মেনু ও সেটিংস সেভ (আগের মতই আছে)
    document.getElementById('save-item').onclick = async () => {
        const id = document.getElementById('edit-id').value;
        const data = { name: document.getElementById('nameInp').value, price: parseFloat(document.getElementById('priceInp').value), image: document.getElementById('imgInp').value };
        if(id) await updateDoc(doc(db, "restaurants/demo-restaurant/menu", id), data);
        else await addDoc(collection(db, "restaurants/demo-restaurant/menu"), {...data, createdAt: serverTimestamp()});
        location.reload();
    };

    document.getElementById('save-settings').onclick = async () => {
        alert("সেটিংস সংরক্ষিত হয়েছে!");
    };
</script>
</body>
</html>
