<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme IT Control Panel</title>
    <style>
        :root { --gold: #c9a84c; --bg: #0d0d0d; --card: #161616; --text: #f5f0e8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* হোটেল ব্যানার */
        .admin-banner { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=800&q=80'); 
            height: 120px; background-size: cover; background-position: center; border-radius: 10px; border: 1px solid var(--gold); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 20px; }
        .admin-banner h1 { color: var(--gold); margin: 0; font-size: 20px; text-transform: uppercase; }

        /* ট্যাব স্টাইল */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { padding: 8px 15px; border: 1px solid var(--gold); background: transparent; color: #fff; cursor: pointer; border-radius: 5px; font-size: 14px; }
        .active-tab { background: var(--gold); color: #000; font-weight: bold; }
        
        .box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; }
        
        /* মেনু লিস্ট এডিট/ডিলিট */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        .edit-btn { background: var(--gold); color: black; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; margin-right: 5px; font-size: 12px; }
        .del-btn { background: #e74c3c; color: white; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        
        .order-card { border-left: 5px solid var(--gold); padding: 15px; background: #1a1a1a; margin-bottom: 15px; border-radius: 8px; position: relative; }
    </style>
</head>
<body>

    <div class="admin-banner">
        <h1>SUPREME IT CONTROL PANEL</h1>
        <p style="color:var(--gold); font-size: 12px;">অ্যাডমিন ড্যাশবোর্ড</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active-tab" onclick="switchPage('menu-page')">খাবার যোগ/এডিট</button>
        <button class="tab-btn" onclick="switchPage('order-page')">অর্ডার ও বিল প্রিন্ট</button>
        <button class="tab-btn" onclick="switchPage('settings-page')">সেটিংস</button>
    </div>

    <div id="menu-page" class="page">
        <div class="box">
            <h3 id="form-title">আইটেম যোগ/এডিট করুন</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="itemName" placeholder="খাবারের নাম">
            <input type="number" id="itemPrice" placeholder="মূল্য (৳)">
            <input type="text" id="itemImg" placeholder="ইমেজ লিঙ্ক">
            <button class="btn-gold" id="save-btn">আইটেম সেভ করুন</button>
        </div>
        <div class="box">
            <h3>বর্তমান মেনু</h3>
            <div id="menu-container">লোড হচ্ছে...</div>
        </div>
    </div>

    <div id="order-page" class="page" style="display:none;">
        <div id="order-container"></div>
    </div>

    <div id="settings-page" class="page" style="display:none;">
        <div class="box">
            <h3>হোটেল সেটিংস এডিট করুন</h3>
            <input type="text" value="Supreme IT Hotel" placeholder="হোটেলের নাম">
            <input type="text" value="নারায়ণগঞ্জ, ঢাকা" placeholder="ঠিকানা">
            <button class="btn-gold">সেটিংস আপডেট করুন</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAIBAoApGa4HXrdk15tezQl9WYeIIGEci4",
        authDomain: "qr-menu-system-88ea9.firebaseapp.com",
        projectId: "qr-menu-system-88ea9",
        appId: "1:1038515456469:web:bfd7366988b7119ea9155c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // পেজ সুইচিং ফাংশন
    window.switchPage = (pageId) => {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(pageId).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        event.target.classList.add('active-tab');
    };

    // মেনু সেভ ও আপডেট লজিক
    document.getElementById('save-btn').onclick = async () => {
        const id = document.getElementById('edit-id').value;
        const data = {
            name: document.getElementById('itemName').value,
            price: parseFloat(document.getElementById('itemPrice').value),
            image: document.getElementById('itemImg').value,
            createdAt: serverTimestamp()
        };
        if(id) await updateDoc(doc(db, "restaurants/demo-restaurant/menu", id), data);
        else await addDoc(collection(db, "restaurants/demo-restaurant/menu"), data);
        location.reload();
    };

    // মেনু লিস্ট রিড ও এডিট বাটন সেটআপ
    onSnapshot(query(collection(db, "restaurants/demo-restaurant/menu"), orderBy("createdAt", "desc")), (snap) => {
        const container = document.getElementById('menu-container');
        container.innerHTML = '';
        snap.forEach(d => {
            const item = d.data();
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<span>${item.name} - ৳${item.price}</span>
                <div>
                    <button class="edit-btn" onclick="prepareEdit('${d.id}', '${item.name}', ${item.price}, '${item.image}')">Edit</button>
                    <button class="del-btn" onclick="handleDelete('${d.id}', 'menu')">Del</button>
                </div>`;
            container.appendChild(div);
        });
    });

    window.prepareEdit = (id, name, price, img) => {
        document.getElementById('edit-id').value = id;
        document.getElementById('itemName').value = name;
        document.getElementById('itemPrice').value = price;
        document.getElementById('itemImg').value = img;
        document.getElementById('form-title').innerText = "আইটেম আপডেট করুন";
        window.scrollTo(0,0);
    };

    // অর্ডার লিস্ট
    onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snap) => {
        const container = document.getElementById('order-container');
        container.innerHTML = '<h3>সাম্প্রটিক অর্ডারসমূহ</h3>';
        snap.forEach(d => {
            const o = d.data();
            container.innerHTML += `<div class="order-card">
                <b>টেবিল: ${o.table_number}</b> | ${o.customer_name}<br>
                আইটেম: ${o.items} | বিল: ৳${o.total_amount}<br>
                স্ট্যাটাস: <b>${o.order_status}</b>
                <div style="margin-top:10px;">
                    <select onchange="updateOrderStatus('${d.id}', this.value)">
                        <option value="">স্ট্যাটাস পরিবর্তন</option>
                        <option value="Processing">Processing</option>
                        <option value="Serving">Serving</option>
                        <option value="Done">Done</option>
                    </select>
                    <button class="del-btn" style="float:right" onclick="handleDelete('${d.id}', 'orders')">Delete Order</button>
                </div>
            </div>`;
        });
    });

    window.updateOrderStatus = async (id, s) => { if(s) await updateDoc(doc(db, "orders", id), { order_status: s }); };

    window.handleDelete = async (id, type) => {
        if(confirm("আপনি কি নিশ্চিত?")) {
            const path = type === 'menu' ? "restaurants/demo-restaurant/menu" : "orders";
            await deleteDoc(doc(db, path, id));
        }
    };
</script>
</body>
</html>
