<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Supreme IT - Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0d0d0d; color: #f5f0e8; }
        .stat-card { background: #161616; border-bottom: 4px solid #c9a84c; }
        @media print { body * { visibility: hidden; } #printArea, #printArea * { visibility: visible; } #printArea { position: absolute; left: 0; top: 0; width: 100%; display: block !important; color: black !important; } }
    </style>
    <div id="login-screen" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-6">
    <div class="bg-[#161616] p-8 rounded-2xl border border-[#c9a84c] w-full max-w-sm text-center">
        <h2 class="text-2xl font-bold mb-6 gold-text">ADMIN ACCESS</h2>
        <input type="password" id="adminPass" placeholder="পাসওয়ার্ড দিন" class="w-full p-3 bg-black border border-gray-700 rounded-lg text-white mb-4 text-center">
        <button onclick="checkPass()" class="w-full gold-bg text-black font-bold py-3 rounded-lg">লগইন করুন</button>
        <p id="err" class="text-red-500 text-xs mt-3 hidden">ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।</p>
    </div>
</div>

<script>
    // আপাতত পাসওয়ার্ড '1234' সেট করা আছে, তুই চাইলে পরে পাল্টে নিস
    function checkPass() {
        const p = document.getElementById('adminPass').value;
        if(p === '1234') { 
            document.getElementById('login-screen').style.display = 'none';
        } else {
            document.getElementById('err').classList.remove('hidden');
        }
    }
</script>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-[#c9a84c] border-b border-gray-800 pb-4 text-center">SUPREME IT CONTROL PANEL</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="stat-card p-6 rounded-xl shadow-lg text-center">
                <h3 class="text-gray-400 uppercase text-xs mb-2">আজকের মোট বিক্রি</h3>
                <p class="text-3xl font-bold text-[#c9a84c]">৳ <span id="sales-amt">0</span></p>
                <p class="text-green-500 text-xs mt-2">↑ ১২% গতদিনের তুলনায়</p>
            </div>
            <div class="stat-card p-6 rounded-xl shadow-lg text-center">
                <h3 class="text-gray-400 uppercase text-xs mb-2">মোট অর্ডার</h3>
                <p class="text-3xl font-bold" id="order-count">0</p>
            </div>
            <div class="stat-card p-6 rounded-xl shadow-lg flex items-center justify-center">
                <canvas id="salesChart" height="100"></canvas>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-[#161616] p-6 rounded-xl border border-gray-800">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-bell text-red-500"></i> লাইভ অর্ডার</h2>
                <div id="order-list" class="space-y-4 max-h-[600px] overflow-y-auto pr-2"></div>
            </div>

            <div class="bg-[#161616] p-6 rounded-xl border border-gray-800">
                <h2 class="text-xl font-bold mb-4">মেনু ও স্টক কন্ট্রোল</h2>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <input id="nInp" placeholder="নাম" class="bg-[#222] p-2 rounded border border-gray-700">
                    <input id="pInp" type="number" placeholder="দাম" class="bg-[#222] p-2 rounded border border-gray-700">
                    <input id="iInp" placeholder="ইমেজ ইউআরএল" class="bg-[#222] p-2 rounded border border-gray-700 col-span-2">
                    <button onclick="addItem()" class="bg-[#c9a84c] text-black font-bold p-2 rounded col-span-2">নতুন আইটেম যোগ করুন</button>
                </div>
                <div id="admin-menu-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <div id="printArea" class="hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, updateDoc, deleteDoc, doc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAIBAoApGa4HXrdk15tezQl9WYeIIGEci4", authDomain: "qr-menu-system-88ea9.firebaseapp.com", projectId: "qr-menu-system-88ea9", appId: "1:1038515456469:web:bfd7366988b7119ea9155c" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // লাইভ অর্ডার আপডেট
        onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snap) => {
            const list = document.getElementById('order-list'); list.innerHTML = '';
            let sales = 0;
            snap.forEach(d => {
                const o = d.data();
                if(o.status === "Done") sales += o.total_amount;
                list.innerHTML += `
                    <div class="bg-[#222] p-4 rounded-lg border-l-4 ${o.status==='Pending'?'border-yellow-500':'border-green-500'}">
                        <div class="flex justify-between">
                            <b>টেবিল ${o.table_number}: ${o.customer_name}</b>
                            <span class="text-[10px] text-gray-500">${o.customer_phone}</span>
                        </div>
                        <p class="text-sm my-2 text-gray-300">${o.items}</p>
                        <div class="flex gap-2">
                            <select onchange="updateStatus('${d.id}', this.value)" class="bg-black text-xs p-1 rounded border border-gray-700">
                                <option value="Pending" ${o.status==='Pending'?'selected':''}>Pending</option>
                                <option value="Cooking" ${o.status==='Cooking'?'selected':''}>Cooking</option>
                                <option value="Served" ${o.status==='Served'?'selected':''}>Served</option>
                                <option value="Done" ${o.status==='Done'?'selected':''}>Done</option>
                                <option value="Cancelled" ${o.status==='Cancelled'?'selected':''}>Cancel</option>
                            </select>
                            <button onclick="printOrder('${d.id}')" class="bg-blue-600 px-3 py-1 rounded text-xs">Print</button>
                        </div>
                    </div>`;
            });
            document.getElementById('sales-amt').innerText = sales;
            document.getElementById('order-count').innerText = snap.size;
        });

        window.updateStatus = (id, s) => updateDoc(doc(db, "orders", id), { status: s });
        
        // মেনু ও স্টক কন্ট্রোল
        onSnapshot(collection(db, "restaurants/demo-restaurant/menu"), (snap) => {
            const mList = document.getElementById('admin-menu-list'); mList.innerHTML = '';
            snap.forEach(d => {
                const i = d.data();
                mList.innerHTML += `
                    <div class="flex items-center justify-between bg-[#222] p-2 rounded text-xs">
                        <div class="flex items-center gap-2">
                            <img src="${i.image}" class="w-8 h-8 rounded object-cover">
                            <span>${i.name}</span>
                        </div>
                        <div class="flex gap-2 items-center">
                            <button onclick="toggleStock('${d.id}', ${!i.is_available})" class="${i.is_available?'text-green-500':'text-red-500'} font-bold">
                                ${i.is_available?'In Stock':'Out'}
                            </button>
                            <button onclick="deleteDoc(doc(db, 'restaurants/demo-restaurant/menu', '${d.id}'))" class="text-gray-500">✖</button>
                        </div>
                    </div>`;
            });
        });

        window.toggleStock = (id, state) => updateDoc(doc(db, "restaurants/demo-restaurant/menu", id), { is_available: state });

        window.addItem = () => {
            addDoc(collection(db, "restaurants/demo-restaurant/menu"), {
                name: document.getElementById('nInp').value,
                price_full: Number(document.getElementById('pInp').value),
                image: document.getElementById('iInp').value,
                category: "All", is_available: true, createdAt: serverTimestamp()
            });
        };
        const ctx = document.getElementById('salesChart').getContext('2d');
let myChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['শনি', 'রবি', 'সোম', 'মঙ্গল', 'বুধ', 'বৃহঃ', 'শুক্র'],
        datasets: [{
            label: 'বিক্রি (৳)',
            data: [1200, 1900, 1500, 2500, 2200, 3000, 4500], // এখানে লাইভ ডাটা কানেক্ট হবে
            borderColor: '#c9a84c',
            borderWidth: 2,
            tension: 0.4,
            fill: true,
            backgroundColor: 'rgba(201, 168, 76, 0.1)'
        }]
    },
    options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { y: { display: false }, x: { grid: { display: false } } }
    }
});
    </script>
</body> 
</html>
